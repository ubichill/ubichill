<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>サーバーエラー - Ubichill</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #faf6f0;
        font-family: system-ui, sans-serif;
        color: #1b2a44;
      }
      .card {
        text-align: center;
        padding: 48px 40px;
        background: #f5ecdf;
        border: 1px solid #cebca2;
        border-radius: 16px;
        max-width: 400px;
        width: 90%;
      }
      h1 { font-size: 18px; font-weight: 600; margin: 0 0 8px; }
      p  { font-size: 14px; color: #5e6a82; margin: 0 0 24px; line-height: 1.6; }
      a  {
        display: inline-block;
        padding: 10px 24px;
        background: #1b2a44;
        color: #f8f3ea;
        border-radius: 8px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>サーバーエラーが発生しました</h1>
      <p>一時的な問題が発生しています。<br>しばらく待ってから再度お試しください。</p>
      <a href="/">トップへ戻る</a>
    </div>
  </body>
</html>
