name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.gitignore'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract Versions from package.json
        id: versions
        run: |
          echo "node=$(jq -r '.volta.node' package.json)" >> $GITHUB_OUTPUT
          echo "pnpm=$(jq -r '.volta.pnpm' package.json)" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ steps.versions.outputs.pnpm }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: 'pnpm'

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/packages/frontend/.next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-${{ hashFiles('packages/frontend/src/**/*.[jt]s', 'packages/frontend/src/**/*.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/pnpm-lock.yaml') }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_COMMIT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}
          COMMIT_HASH: ${{ github.event.pull_request.head.sha || github.sha }}

      # PR → main の場合のみ成果物を次ジョブへ渡す
      # upload-artifact@v4 は共通祖先ディレクトリ(packages/)を除去してアーカイブする。
      # .next は隠しディレクトリのため include-hidden-files: true が必要。
      # standalone は server.js のみ使用するため 1 ファイルのみアップロードする。
      - name: Upload build artifacts
        if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ github.event.pull_request.head.sha }}
          path: |
            packages/backend/dist
            packages/shared/dist
            packages/db/dist
            packages/frontend/.next/standalone/packages/frontend/server.js
            packages/frontend/.next/server
            packages/frontend/.next/static
            packages/frontend/.next/BUILD_ID
            packages/frontend/.next/*.json
            packages/frontend/.next/*.js
            packages/frontend/public
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 1

  # 変更検知: どのパッケージが変わったかを判定する
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'packages/backend/**'
              - 'packages/shared/**'
              - 'packages/db/**'
              - 'Dockerfile.ci'
              - 'pnpm-lock.yaml'
            frontend:
              - 'packages/frontend/**'
              - 'packages/shared/**'
              - 'packages/sdk/**'
              - 'Dockerfile.ci'
              - 'pnpm-lock.yaml'

  sync-to-dev:
    name: Sync to dev & build Docker images
    needs: [lint-and-build, detect-changes]
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      (needs.detect-changes.outputs.backend == 'true' ||
       needs.detect-changes.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write      # devブランチへのpushに必要
      pull-requests: write # PRコメントの投稿に必要
      packages: write      # GHCRへのイメージpushに必要
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME_BACKEND: ubichill-backend
      IMAGE_NAME_FRONTEND: ubichill-frontend

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Extract versions from package.json
        id: versions
        run: |
          echo "node=$(jq -r '.volta.node' package.json)" >> $GITHUB_OUTPUT
          echo "pnpm=$(jq -r '.volta.pnpm' package.json)" >> $GITHUB_OUTPUT
          echo "short-sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts-${{ github.event.pull_request.head.sha }}
          # upload-artifact@v4 は共通祖先ディレクトリ(packages/)を除去してアーカイブするため
          # path を packages に指定して packages/*/dist の形でリストアする
          path: packages

      # .dockerignore は packages/*/dist を除外しているが Dockerfile.ci では dist が必要なため上書きする
      - name: Override .dockerignore for CI build
        run: cp Dockerfile.ci.dockerignore .dockerignore

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Dockerfile.ci を使用（turbo prune なし・ビルド成果物をそのまま利用）
      - name: Build and push Backend image
        if: needs.detect-changes.outputs.backend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          target: backend-runner
          push: true
          build-args: |
            NODE_VERSION=${{ steps.versions.outputs.node }}
            PNPM_VERSION=${{ steps.versions.outputs.pnpm }}
            COMMIT_HASH=${{ steps.versions.outputs.short-sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_BACKEND }}:dev
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_BACKEND }}:dev-${{ steps.versions.outputs.short-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false

      - name: Build and push Frontend image
        if: needs.detect-changes.outputs.frontend == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          target: frontend-runner
          push: true
          build-args: |
            NODE_VERSION=${{ steps.versions.outputs.node }}
            PNPM_VERSION=${{ steps.versions.outputs.pnpm }}
            COMMIT_HASH=${{ steps.versions.outputs.short-sha }}
            NEXT_PUBLIC_COMMIT_HASH=${{ steps.versions.outputs.short-sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_FRONTEND }}:dev
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME_FRONTEND }}:dev-${{ steps.versions.outputs.short-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=min
          provenance: false

      - name: Force push to dev
        run: |
          git push --force origin HEAD:refs/heads/dev

      - name: Comment on PR (create or update)
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- sync-to-dev-bot -->';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              '### 🚀 Dev環境へのデプロイが開始されました',
              '',
              `| 項目 | 値 |`,
              `|------|-----|`,
              `| ブランチ | \`${branch}\` → \`dev\` |`,
              `| コミット | \`${sha}\` |`,
              `| Dev環境 | https://ubichill-dev.youkan.uk/ |`,
              `| Actionログ | [確認する](${runUrl}) |`,
              '',
              '**デプロイ完了まで数分かかります。** ArgoCDがイメージの更新を検知してからK8sへ反映されます。',
              'デプロイ後にDev環境のバッジ（画面右下）でコミットハッシュを確認してください。',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
