name: CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.gitignore'
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.vscode/**'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract versions from package.json
        id: versions
        run: |
          echo "node=$(jq -r '.volta.node' package.json)" >> $GITHUB_OUTPUT
          echo "pnpm=$(jq -r '.volta.pnpm' package.json)" >> $GITHUB_OUTPUT

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ steps.versions.outputs.pnpm }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  # 変更検知: どのパッケージが変わったかを判定する
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'main'
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      video-player: ${{ steps.filter.outputs.video-player }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'packages/backend/**'
              - 'packages/shared/**'
              - 'packages/db/**'
              - 'Dockerfile'
              - 'pnpm-lock.yaml'
            frontend:
              - 'packages/frontend/**'
              - 'packages/shared/**'
              - 'packages/sdk/**'
              - 'plugins/**'
              - 'scripts/build-workers.mjs'
              - 'Dockerfile'
              - 'pnpm-lock.yaml'
            video-player:
              - 'plugins/video-player/backend/**'

  # ── Docker ビルド（並列）────────────────────────────────────────────────

  build-backend:
    name: Build and push Backend image
    needs: [lint, detect-changes]
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ubichill-backend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Extract versions
        id: versions
        run: |
          echo "node=$(jq -r '.volta.node' package.json)" >> $GITHUB_OUTPUT
          echo "pnpm=$(jq -r '.volta.pnpm' package.json)" >> $GITHUB_OUTPUT
          echo "short-sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: backend-runner
          push: true
          build-args: |
            NODE_VERSION=${{ steps.versions.outputs.node }}
            PNPM_VERSION=${{ steps.versions.outputs.pnpm }}
            COMMIT_HASH=${{ steps.versions.outputs.short-sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:dev-${{ steps.versions.outputs.short-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  build-frontend:
    name: Build and push Frontend image
    needs: [lint, detect-changes]
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ubichill-frontend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Extract versions
        id: versions
        run: |
          echo "node=$(jq -r '.volta.node' package.json)" >> $GITHUB_OUTPUT
          echo "pnpm=$(jq -r '.volta.pnpm' package.json)" >> $GITHUB_OUTPUT
          echo "short-sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          target: frontend-runner
          push: true
          build-args: |
            NODE_VERSION=${{ steps.versions.outputs.node }}
            PNPM_VERSION=${{ steps.versions.outputs.pnpm }}
            COMMIT_HASH=${{ steps.versions.outputs.short-sha }}
            VITE_COMMIT_HASH=${{ steps.versions.outputs.short-sha }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:dev-${{ steps.versions.outputs.short-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  build-video-player:
    name: Build and push Video Player image
    needs: [lint, detect-changes]
    if: >
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.user.login != 'dependabot[bot]' &&
      needs.detect-changes.outputs.video-player == 'true'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: video-player-backend

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Extract short SHA
        id: versions
        run: |
          echo "short-sha=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: plugins/video-player/backend
          file: plugins/video-player/backend/Dockerfile.prod
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:dev
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:dev-${{ steps.versions.outputs.short-sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ── Force push to dev（全ビルド完了後）──────────────────────────────────
  # ビルドが skipped（変更なし）でも failure でなければ実行する。
  # いずれか 1 つ以上が success であることを確認してから push する。

  deploy-dev:
    name: Force push to dev
    needs: [build-backend, build-frontend, build-video-player]
    if: >
      always() && !cancelled() &&
      needs.build-backend.result    != 'failure' &&
      needs.build-frontend.result   != 'failure' &&
      needs.build-video-player.result != 'failure' &&
      (
        needs.build-backend.result    == 'success' ||
        needs.build-frontend.result   == 'success' ||
        needs.build-video-player.result == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Force push to dev
        run: git push --force origin HEAD:refs/heads/dev

      - name: Comment on PR (create or update)
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- sync-to-dev-bot -->';
            const sha = context.payload.pull_request.head.sha.slice(0, 7);
            const branch = context.payload.pull_request.head.ref;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              marker,
              '### Dev環境へのデプロイが開始されました',
              '',
              `| 項目 | 値 |`,
              `|------|-----|`,
              `| ブランチ | \`${branch}\` → \`dev\` |`,
              `| コミット | \`${sha}\` |`,
              `| Dev環境 | https://ubichill-dev.youkan.uk/ |`,
              `| Actionログ | [確認する](${runUrl}) |`,
              '',
              '**デプロイ完了まで数分かかります。** ArgoCDがイメージの更新を検知してからK8sへ反映されます。',
              'デプロイ後にDev環境のバッジ（画面右下）でコミットハッシュを確認してください。',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
