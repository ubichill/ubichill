name: CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - ".gitignore"
  pull_request:
    types: [opened, synchronize, reopened]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".vscode/**"
      - ".gitignore"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Node 20 は GitHub Actions runner 上で deprecate された (2026-09-16 削除予定)。
# 各 actions は Node 24 対応版へ更新済み (docker/* は v4/v7、pnpm は v6、setup-node は v5 等)。
# 念のため workflow レベルでも JS actions を Node 24 に強制しておく (保険)。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Extract Node version from package.json
        id: versions
        run: |
          echo "node=$(jq -r '.volta.node' package.json)" >> $GITHUB_OUTPUT

      # pnpm version は package.json の packageManager フィールドから自動検出
      # (action-setup v4 は version 入力と packageManager の二重指定をエラーにする)
      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ steps.versions.outputs.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

  # 変更検知: PR 時はパスフィルタ、push to main では全て true を返す。
  detect-changes:
    name: Detect changed packages
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ github.event_name == 'push' && 'true' || steps.filter.outputs.backend }}
      frontend: ${{ github.event_name == 'push' && 'true' || steps.filter.outputs.frontend }}
      video-player: ${{ github.event_name == 'push' && 'true' || steps.filter.outputs.video-player }}
      next-version: ${{ steps.next-version.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next version
        id: next-version
        if: github.event_name == 'push'
        run: |
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            NEXT="v0.0.1"
          else
            IFS='.' read -r major minor patch <<< "${LATEST#v}"
            NEXT="v${major}.${minor}.$((patch + 1))"
          fi
          echo "tag=${NEXT}" >> $GITHUB_OUTPUT

      # ── 変更検知 ───────────────────────────────────────────────
      # 実装は .github/scripts/detect-changed-paths.sh を参照。
      # opened / reopened: PR base から cumulative、synchronize: 前回 push HEAD から incremental
      - name: Detect changed paths
        id: filter
        if: github.event_name == 'pull_request'
        env:
          PR_ACTION: ${{ github.event.action }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BEFORE_SHA: ${{ github.event.before }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: .github/scripts/detect-changed-paths.sh

  # ── Docker ビルド（並列）────────────────────────────────────────────────
  # push to main → 全イメージを :latest / :sha-<sha> / :<version> でビルド
  # PR           → 変更検知でフィルタし :pr-<番号>（PR の最新）/ :sha-<sha>（不変）でビルド
  #   いずれも immutable な :sha-<sha> を必ず付与。共有の可変 :dev タグは廃止し、
  #   デプロイ（PR ごとの環境など）は GitOps 側がこれらのタグを参照する。

  build-backend:
    name: Build and push Backend image
    needs: [lint, detect-changes]
    if: >
      needs.detect-changes.outputs.backend == 'true' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ubichill-backend

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Extract versions
        id: versions
        run: |
          echo "node=$(jq -r '.volta.node' package.json)" >> $GITHUB_OUTPUT
          echo "pnpm=$(jq -r '.volta.pnpm' package.json)" >> $GITHUB_OUTPUT
          SHA="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          echo "short-sha=$(echo "$SHA" | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "next-version=${{ needs.detect-changes.outputs.next-version }}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: backend-runner
          push: true
          build-args: |
            NODE_VERSION=${{ steps.versions.outputs.node }}
            PNPM_VERSION=${{ steps.versions.outputs.pnpm }}
            COMMIT_HASH=${{ steps.versions.outputs.short-sha }}
          tags: |
            ${{ github.event_name == 'push' && format('{0}/{1}/{2}:latest', env.REGISTRY, github.repository_owner, env.IMAGE_NAME) || '' }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ steps.versions.outputs.short-sha }}
            ${{ github.event_name == 'pull_request' && format('{0}/{1}/{2}:pr-{3}', env.REGISTRY, github.repository_owner, env.IMAGE_NAME, github.event.pull_request.number) || '' }}
            ${{ github.event_name == 'push' && format('{0}/{1}/{2}:{3}', env.REGISTRY, github.repository_owner, env.IMAGE_NAME, steps.versions.outputs.next-version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  build-frontend:
    name: Build and push Frontend image
    needs: [lint, detect-changes]
    if: >
      needs.detect-changes.outputs.frontend == 'true' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ubichill-frontend

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Extract versions
        id: versions
        run: |
          echo "node=$(jq -r '.volta.node' package.json)" >> $GITHUB_OUTPUT
          echo "pnpm=$(jq -r '.volta.pnpm' package.json)" >> $GITHUB_OUTPUT
          SHA="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          echo "short-sha=$(echo "$SHA" | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "next-version=${{ needs.detect-changes.outputs.next-version }}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          target: frontend-runner
          push: true
          build-args: |
            NODE_VERSION=${{ steps.versions.outputs.node }}
            PNPM_VERSION=${{ steps.versions.outputs.pnpm }}
            COMMIT_HASH=${{ steps.versions.outputs.short-sha }}
            VITE_COMMIT_HASH=${{ steps.versions.outputs.short-sha }}
            VITE_ENVIRONMENT=${{ github.event_name == 'push' && 'production' || 'development' }}
          tags: |
            ${{ github.event_name == 'push' && format('{0}/{1}/{2}:latest', env.REGISTRY, github.repository_owner, env.IMAGE_NAME) || '' }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ steps.versions.outputs.short-sha }}
            ${{ github.event_name == 'pull_request' && format('{0}/{1}/{2}:pr-{3}', env.REGISTRY, github.repository_owner, env.IMAGE_NAME, github.event.pull_request.number) || '' }}
            ${{ github.event_name == 'push' && format('{0}/{1}/{2}:{3}', env.REGISTRY, github.repository_owner, env.IMAGE_NAME, steps.versions.outputs.next-version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  build-video-player:
    name: Build and push Video Player image
    needs: [lint, detect-changes]
    if: >
      needs.detect-changes.outputs.video-player == 'true' &&
      github.event.pull_request.user.login != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: video-player-backend

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}

      - name: Extract short SHA
        id: versions
        run: |
          SHA="${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          echo "short-sha=$(echo "$SHA" | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "next-version=${{ needs.detect-changes.outputs.next-version }}" >> $GITHUB_OUTPUT

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v7
        with:
          context: plugins/video-player/backend
          file: plugins/video-player/backend/Dockerfile
          target: production
          push: true
          build-args: |
            YTDLP_REFRESH=${{ steps.versions.outputs.short-sha }}
          tags: |
            ${{ github.event_name == 'push' && format('{0}/{1}/{2}:latest', env.REGISTRY, github.repository_owner, env.IMAGE_NAME) || '' }}
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:sha-${{ steps.versions.outputs.short-sha }}
            ${{ github.event_name == 'pull_request' && format('{0}/{1}/{2}:pr-{3}', env.REGISTRY, github.repository_owner, env.IMAGE_NAME, github.event.pull_request.number) || '' }}
            ${{ github.event_name == 'push' && format('{0}/{1}/{2}:{3}', env.REGISTRY, github.repository_owner, env.IMAGE_NAME, steps.versions.outputs.next-version) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  # ── git タグ付け（push to main のビルド完了後）──────────────────────────────

  tag-release:
    name: Tag release
    needs: [detect-changes, build-backend, build-frontend, build-video-player]
    if: >
      always() && !cancelled() &&
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.build-backend.result    != 'failure' &&
      needs.build-frontend.result   != 'failure' &&
      needs.build-video-player.result != 'failure' &&
      (
        needs.build-backend.result    == 'success' ||
        needs.build-frontend.result   == 'success' ||
        needs.build-video-player.result == 'success'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.detect-changes.outputs.next-version }}
          git push origin ${{ needs.detect-changes.outputs.next-version }}
