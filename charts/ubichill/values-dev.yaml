# Development environment values for ubichill
# Override default values for development

# Clear global image registry for local images
global:
  imageRegistry: ""
  security:
    allowInsecureImages: true

# Backend configuration for development
backend:
  replicaCount: 1  # Single replica for dev
  
  image:
    repository: "ghcr.io/ubichill/ubichill-backend"
    # 既定は最新公開イメージ。PR プレビュー環境では GitOps(ArgoCD ApplicationSet) が
    # image.tag を :pr-<番号> / :sha-<sha> に上書きする（共有の :dev タグは廃止済み）。
    tag: "latest"
    pullPolicy: Always
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  autoscaling:
    enabled: false  # Disable HPA in dev
  
  env:
    NODE_ENV: "development"
    TRUST_PROXY: "true"
    CORS_ORIGIN: "*"  # dev では全オリジン許可
  secretEnv:
    BETTER_AUTH_SECRET: "dev-secret-key"
    RESEND_API_KEY: "dev-resend-key"

# Frontend configuration for development  
frontend:
  replicaCount: 1  # Single replica for dev
  
  image:
    repository: "ghcr.io/ubichill/ubichill-frontend"
    # 既定は最新公開イメージ。PR プレビューは GitOps が :pr-<番号> / :sha-<sha> に上書き。
    tag: "latest"
    pullPolicy: Always
  
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  
  autoscaling:
    enabled: false  # Disable HPA in dev
  
  # BACKEND_HOST / BACKEND_PORT は deployment.yaml テンプレートで自動注入
  env: {}

# Use Redis for shared caching
redis:
  enabled: true
  global:
    imageRegistry: ""
  master:
    persistence:
      enabled: false  # No persistence needed in dev
    resources:
      limits:
        memory: 128Mi
        cpu: 100m
      requests:
        memory: 64Mi
        cpu: 50m

# Enable PostgreSQL for dev
postgresql:
  enabled: true
  global:
    imageRegistry: ""

# Worlds: official はバンドルした worlds/（per-PR ではその PR ブランチの内容）を使う。
# 外部ワールドは実行時に URL で on-demand 参照する（連合）。起動時 seed は無し。

# Mod backends for development
modBackends:
  - id: video-player
    image:
      repository: ghcr.io/ubichill/video-player-backend
      tag: latest
    port: 8000
    pathPrefix: /mods/video-player/api
    replicaCount: 1
    env:
      ROOT_PATH: /mods/video-player/api
      CORS_ORIGINS: "*"
      # YouTube の bot 判定（"Sign in to confirm you're not a bot"）が出る場合の回避策（任意）。
      # 通常は不要（多くは VPN/データセンター IP が原因。住宅 IP なら出ない）。出るときだけ有効化:
      #   YTDLP_PLAYER_CLIENT: "default,tv,ios"   # extractor の client を切替で回避を試す
      #   YTDLP_COOKIES_FILE: /secrets/youtube-cookies.txt  # 確実。cookies.txt を volume マウントして指定
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

# Ingress configuration for development
ingress:
  enabled: true
  className: "cloudflare"
  # dev では global.domain を設定してデフォルトルールを自動生成する
  # hosts / tls はハードコードしない