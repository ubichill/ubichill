# Development environment values for ubichill
# Override default values for development

# Clear global image registry for local images
global:
  imageRegistry: ""
  security:
    allowInsecureImages: true

# Backend configuration for development
backend:
  replicaCount: 1  # Single replica for dev
  
  image:
    repository: "ubichill-backend"
    tag: "latest"
    pullPolicy: Always
  
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  autoscaling:
    enabled: false  # Disable HPA in dev
  
  env:
    NODE_ENV: "development"
    TRUST_PROXY: "true"
    CORS_ORIGIN: "*"  # dev では全オリジン許可
  secretEnv:
    BETTER_AUTH_SECRET: "dev-secret-key"
    RESEND_API_KEY: "dev-resend-key"

# Frontend configuration for development  
frontend:
  replicaCount: 1  # Single replica for dev
  
  image:
    repository: "ubichill-frontend"
    tag: "latest"
    pullPolicy: Always
  
  resources:
    limits:
      cpu: 250m
      memory: 256Mi
    requests:
      cpu: 50m
      memory: 64Mi
  
  autoscaling:
    enabled: false  # Disable HPA in dev
  
  # BACKEND_HOST / BACKEND_PORT は deployment.yaml テンプレートで自動注入
  env: {}

# Use Redis for shared caching
redis:
  enabled: true
  global:
    imageRegistry: ""
  master:
    persistence:
      enabled: false  # No persistence needed in dev
    resources:
      limits:
        memory: 128Mi
        cpu: 100m
      requests:
        memory: 64Mi
        cpu: 50m

# Enable PostgreSQL for dev
postgresql:
  enabled: true
  global:
    imageRegistry: ""

# Worlds registry for development
worlds:
  registries:
    - https://raw.githubusercontent.com/ubichill/ubichill/dev/worlds/worlds.json

# Plugin backends for development
pluginBackends:
  - id: video-player
    image:
      repository: ubichill-video-player-backend
      tag: latest
    port: 8000
    pathPrefix: /plugins/video-player/api
    replicaCount: 1
    env:
      ROOT_PATH: /plugins/video-player/api
      CORS_ORIGINS: "*"
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi

# Ingress configuration for development
ingress:
  enabled: true
  className: "cloudflare"
  # dev では global.domain を設定してデフォルトルールを自動生成する
  # hosts / tls はハードコードしない