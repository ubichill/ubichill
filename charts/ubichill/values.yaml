# Default values for ubichill main application

# Global settings
global:
  imageRegistry: "ghcr.io"
  imagePullPolicy: Always
  # デプロイ時に必須。helm install 時に --set global.domain=example.com で指定する。
  # CORS_ORIGIN / BETTER_AUTH_URL / Ingress host はここから自動導出される。
  domain: ""
  compatibility:
    openshift:
      adaptSecurityContext: auto
  security:
    allowInsecureImages: true

# Worlds configuration
# ワールド定義は URL レジストリから取得する（ConfigMap 不要）
worlds:
  # ワールド YAML を取得するURL一覧（カンマ区切りで環境変数に渡される）
  # GitHub tree URL を指定すると GitHub Contents API で自動解決する
  # 例: https://github.com/ubichill/ubichill/tree/main/worlds
  # 例: https://raw.githubusercontent.com/ubichill/ubichill/main/worlds/default.yaml
  registries: []
  # プライベートリポジトリの場合はトークンを設定（Secret として注入される）
  # 本番環境では registryToken に直書きせず existingTokenSecret を使うことを推奨
  registryToken: ""
  # 既存の Secret を使う場合（key: token が必要）。設定すると registryToken の Secret 生成をスキップ
  existingTokenSecret: ""

# Backend application configuration
backend:
  enabled: true
  replicaCount: 1

  # Drizzle migration を Helm hook (pre-install/pre-upgrade) で実行する設定。
  # backend Deployment より先に走り、失敗すると ロールアウトが止まる (= 安全側)。
  migrate:
    enabled: true
    backoffLimit: 2
    ttlSecondsAfterFinished: 300
    # resources を省略すると backend.resources を使う

  image:
    repository: "ubichill-backend"
    tag: "latest"
    pullPolicy: Always

  service:
    type: ClusterIP
    port: 3001
    targetPort: 3001
  
  # Resource management
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  
  # Auto-scaling configuration
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
    
    # Scaling behavior
    behavior:
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 50
            periodSeconds: 60
      scaleUp:
        stabilizationWindowSeconds: 0
        policies:
          - type: Percent
            value: 100
            periodSeconds: 15
          - type: Pods
            value: 2
            periodSeconds: 15
        selectPolicy: Max
  
  # Health checks
  healthcheck:
    enabled: true
    path: "/health"
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      initialDelaySeconds: 10
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
  
  # Environment variables (非機密)
  # ConfigMap (backend-config) に展開され envFrom で注入される。
  #
  # 自動導出される値:
  #   CORS_ORIGIN, BETTER_AUTH_URL ← global.domain から組み立て (上書き可)
  #   REDIS_URL                    ← redis subchart 名から組み立て
  #   WORLDS_REGISTRY_URLS         ← worlds.registries から組み立て
  #   WORLDS_DIR                   ← /worlds-rw 固定
  #
  # よく使う option (string で渡す。zod の transform が boolean に変換する):
  #   SKIP_EMAIL_VERIFICATION: "true"   # OTP/メール送信を skip して直接登録 (dev 用)
  #   TRUST_PROXY: "true"               # Ingress 経由で X-Forwarded-* を信用 (rate limit IP 正確化)
  #   DEBUG: "true"                     # logger.debug を有効化
  #   NODE_ENV: "development"           # OTP コードをログに出す等
  env:
    NODE_ENV: "production"
    PORT: "3001"
    # Database / Redis / WORLDS_* は ConfigMap 側で自動導出する

  # Secret environment variables (rendered as Secret)
  # 必須シークレット — values の上書き or existingSecret を必ず指定すること。
  # 空文字 / "replace-*" のような placeholder は template 側で fail-fast する。
  secretEnv:
    BETTER_AUTH_SECRET: ""
    RESEND_API_KEY: ""
  
  # Existing secret containing the secrets (skips secretEnv creation and injects it)
  existingSecret: ""

  # Pod-level security context (fsGroup でマウントされた emptyDir をグループ書き込み可能にする)
  podSecurityContext:
    fsGroup: 1000

  # Container-level security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

# Frontend application configuration
frontend:
  enabled: true
  replicaCount: 1
  
  image:
    repository: "ubichill-frontend"
    tag: "latest" 
    pullPolicy: Always
  
  service:
    type: ClusterIP
    port: 3000
    targetPort: 3000
  
  # Resource management
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  
  # Auto-scaling configuration
  autoscaling:
    enabled: false
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  # Health checks
  healthcheck:
    enabled: true
    path: "/"
    livenessProbe:
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readinessProbe:
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
  
  # Environment variables
  # nginx コンテナが使う環境変数のみ記述する。
  # BACKEND_HOST / BACKEND_PORT は deployment.yaml テンプレートで自動注入されるため不要。
  env: {}

  # Pod-level security context
  podSecurityContext:
    fsGroup: 101

  # Container-level security context
  securityContext:
    runAsNonRoot: true
    runAsUser: 101
    runAsGroup: 101
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false
    capabilities:
      drop:
        - ALL

# Shared Redis cache
redis:
  enabled: true
  architecture: standalone
  # Explicitly reset registry for this subchart to avoid inheriting 'ghcr.io' from global
  global:
    imageRegistry: ""
  image:
    registry: ""
    repository: docker.io/bitnami/redis
    tag: 7.2.4-debian-11-r2
  auth:
    enabled: true
    password: ""
    existingSecret: ""
  master:
    persistence:
      enabled: true
      size: 2Gi
    resources:
      limits:
        memory: 512Mi
        cpu: 500m
      requests:
        memory: 256Mi
        cpu: 100m
  
  # Redis configuration for production
  commonConfiguration: |-
    maxmemory 512mb
    maxmemory-policy allkeys-lru
    appendonly yes
    save 900 1
    save 300 10
    save 60 10000

# Database (optional)
postgresql:
  enabled: true  # Enable if using PostgreSQL
  global:
    imageRegistry: ""
  image:
    registry: docker.io
    repository: bitnami/postgresql
    tag: "16-debian-12"
  auth:
    enablePostgresUser: true
    # postgresPassword: 管理者 (postgres) ユーザーのパスワード。マイグレーション/管理用。
    # password: アプリ用ユーザー (auth.username) のパスワード。**DATABASE_URL はこちらを使う**。
    # 既定で空にしておき、template 側で fail-fast。"password" のような placeholder は禁止。
    postgresPassword: ""
    username: "ubichill"
    password: ""
    existingSecret: ""
    database: "ubichill"
  primary:
    persistence:
      enabled: true
      size: 10Gi
    resources:
      limits:
        memory: 1Gi
        cpu: 500m
      requests:
        memory: 256Mi
        cpu: 100m

# Ingress configuration
ingress:
  enabled: true
  # Cloudflare Ingress Controller を使う場合は該当クラス名を設定する
  # 例: kubectl get ingressclass で確認
  className: ""
  annotations: {}
  # hosts: []  # 未設定時は global.domain から自動生成
  # tls: []    # 未設定時は global.domain から自動生成
  # hosts を手書きする場合は /socket.io → backend も忘れずに追加すること

# Service configuration
service:
  # Frontend service
  frontend:
    type: ClusterIP
    port: 3000
    annotations: {}
  
  # Backend service  
  backend:
    type: ClusterIP
    port: 3001
    annotations: {}

# Pod Disruption Budget
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# Node affinity (optional - for multi-AZ deployment)
nodeAffinity:
  enabled: false
  # 有効時: 配置したいゾーン名をクラスタに合わせて指定する（例: ap-northeast-1a, ap-northeast-1c）
  preferredDuringSchedulingIgnoredDuringExecution:
    - weight: 100
      preference:
        matchExpressions:
        - key: topology.kubernetes.io/zone
          operator: In
          values: []

# Tolerations (optional)
tolerations: []

# Node selector (optional)
nodeSelector: {}

# Plugin backends (optional)
# 任意のプラグインバックエンドコンテナを起動する設定。
# 各エントリは Deployment + Service + Ingress ルールを自動生成する。
# 例:
# pluginBackends:
#   - id: video-player
#     image:
#       repository: ghcr.io/yourorg/video-player-backend
#       tag: latest
#     port: 8000
#     pathPrefix: /plugins/video-player/api
#     replicaCount: 1
#     env:
#       ROOT_PATH: /plugins/video-player/api
#       CORS_ORIGINS: "*"
#     resources:
#       limits:
#         cpu: 500m
#         memory: 512Mi
#       requests:
#         cpu: 100m
#         memory: 128Mi
pluginBackends: []

# Monitoring and observability
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
