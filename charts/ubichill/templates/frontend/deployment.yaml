{{- if .Values.frontend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ubichill.fullname" . }}-frontend
  labels:
    {{- include "ubichill.labels" . | nindent 4 }}
    component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "ubichill.selectorLabels" . | nindent 6 }}
      component: frontend
  template:
    metadata:
      annotations:
        # Force pod restart on chart upgrade
        rollme: {{ randAlphaNum 5 | quote }}
      labels:
        {{- include "ubichill.selectorLabels" . | nindent 8 }}
        component: frontend
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeAffinity.enabled }}
      affinity:
        nodeAffinity:
          {{- with .Values.nodeAffinity.preferredDuringSchedulingIgnoredDuringExecution }}
          preferredDuringSchedulingIgnoredDuringExecution:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "ubichill.selectorLabels" . | nindent 18 }}
                  component: frontend
              topologyKey: kubernetes.io/hostname
      {{- end }}
      serviceAccountName: {{ include "ubichill.serviceAccountName.frontend" . }}
      containers:
      - name: frontend
        securityContext:
          {{- toYaml .Values.frontend.securityContext | nindent 10 }}
        image: {{ include "ubichill.frontend.image" . }}
        imagePullPolicy: {{ .Values.frontend.image.pullPolicy | default .Values.global.imagePullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.frontend.service.targetPort }}
          protocol: TCP
        env:
        # nginx の envsubst テンプレートが参照するバックエンド接続先
        # K8s Service 名を自動解決し、values.yaml に書く必要はない
        - name: BACKEND_HOST
          value: {{ include "ubichill.fullname" . }}-backend
        - name: BACKEND_PORT
          value: {{ .Values.backend.service.port | quote }}
        {{- range $key, $value := .Values.frontend.env }}
        - name: {{ $key }}
          value: {{ $value | quote }}
        {{- end }}
        {{- if .Values.frontend.healthcheck.enabled }}
        livenessProbe:
          httpGet:
            path: {{ .Values.frontend.healthcheck.path }}
            port: http
          initialDelaySeconds: {{ .Values.frontend.healthcheck.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.frontend.healthcheck.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.frontend.healthcheck.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.frontend.healthcheck.livenessProbe.failureThreshold }}
        readinessProbe:
          httpGet:
            path: {{ .Values.frontend.healthcheck.path }}
            port: http
          initialDelaySeconds: {{ .Values.frontend.healthcheck.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.frontend.healthcheck.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.frontend.healthcheck.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.frontend.healthcheck.readinessProbe.failureThreshold }}
        {{- end }}
        volumeMounts:
        # nginx が非 root (uid=1000) で動作するために書き込み可能な emptyDir を使用する。
        # /etc/nginx/conf.d  : envsubst が default.conf を書き出す
        # /var/cache/nginx   : nginx の一時ファイル (client_temp 等)
        # /var/run           : nginx.pid
        - name: nginx-conf-d
          mountPath: /etc/nginx/conf.d
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
        resources:
          {{- toYaml .Values.frontend.resources | nindent 12 }}
      volumes:
      - name: nginx-conf-d
        emptyDir: {}
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
{{- end }}
