{{- if and .Values.backend.enabled (not .Values.backend.existingSecret) }}
{{- /*
  Fail-fast:
   - "replace-..." のような placeholder のまま deploy させない。
   - BETTER_AUTH_SECRET が未設定/空のときは fail する（予測可能なシークレットで
     Better Auth を起動させないため）。値は長いランダム文字列にすること。
  dev/preview は values-dev.yaml が値を持ち、本番は existingSecret を使う想定。
  ※ 自動生成（randAlphaNum: render毎に変わり ArgoCD churn／sha256(ns/name): 予測可能）は
     どちらも不適切なので採用しない。明示指定を必須にする。
*/}}
{{- range $key, $value := .Values.backend.secretEnv }}
{{- if hasPrefix "replace-" ($value | toString) }}
{{- fail (printf "backend.secretEnv.%s has placeholder value %q. Provide a real value or use backend.existingSecret." $key $value) }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ubichill.fullname" . }}-backend-secrets
  labels:
    {{- include "ubichill.labels" . | nindent 4 }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ required "backend.secretEnv.BETTER_AUTH_SECRET を設定してください（または backend.existingSecret を使用）。長いランダム文字列を推奨。" (.Values.backend.secretEnv.BETTER_AUTH_SECRET | toString) | quote }}
  {{- range $key, $value := .Values.backend.secretEnv }}
  {{- if ne $key "BETTER_AUTH_SECRET" }}
  {{ $key }}: {{ $value | toString | quote }}
  {{- end }}
  {{- end }}
{{- end }}
