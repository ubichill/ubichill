{{- if and .Values.backend.enabled (not .Values.backend.existingSecret) }}
{{- /*
  Fail-fast: "replace-..." といった placeholder のまま deploy されると
  Better Auth が予測可能なシークレットで起動してしまう。
  BETTER_AUTH_SECRET 未設定の場合は namespace/name の sha256 から決定的に生成する。
  randAlphaNum は render ごとに変わり ArgoCD が常時 OutOfSync になるため使わない。
  本番環境では existingSecret を使用すること。
*/}}
{{- range $key, $value := .Values.backend.secretEnv }}
{{- if hasPrefix "replace-" ($value | toString) }}
{{- fail (printf "backend.secretEnv.%s has placeholder value %q. Provide a real value or use backend.existingSecret." $key $value) }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ubichill.fullname" . }}-backend-secrets
  labels:
    {{- include "ubichill.labels" . | nindent 4 }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ .Values.backend.secretEnv.BETTER_AUTH_SECRET | default (printf "%s/%s" .Release.Namespace .Release.Name | sha256sum) | quote }}
  {{- range $key, $value := .Values.backend.secretEnv }}
  {{- if ne $key "BETTER_AUTH_SECRET" }}
  {{ $key }}: {{ $value | toString | quote }}
  {{- end }}
  {{- end }}
{{- end }}
