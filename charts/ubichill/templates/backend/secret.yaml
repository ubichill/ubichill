{{- if and .Values.backend.enabled (not .Values.backend.existingSecret) }}
{{- if .Values.backend.secretEnv }}
{{- /*
  Fail-fast: 空文字 / "replace-..." といった placeholder のまま deploy されると
  Better Auth が予測可能なシークレットで起動してしまう。
  本物の値 or existingSecret を必ず明示させる。
*/}}
{{- range $key, $value := .Values.backend.secretEnv }}
{{- $v := $value | toString }}
{{- if or (eq $v "") (hasPrefix "replace-" $v) }}
{{- fail (printf "backend.secretEnv.%s must be set to a real value (got placeholder %q). Provide a real value via values, or use backend.existingSecret." $key $v) }}
{{- end }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ubichill.fullname" . }}-backend-secrets
  labels:
    {{- include "ubichill.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- range $key, $value := .Values.backend.secretEnv }}
  {{ $key }}: {{ $value | toString | quote }}
  {{- end }}
{{- end }}
{{- end }}
