{{- if .Values.backend.enabled }}
{{- if .Values.backend.migrate.enabled }}
{{- /*
  Drizzle マイグレーション実行 Job (Helm hook)。
  pre-install / pre-upgrade フェーズで起動し、backend Deployment より先に DB スキーマを適用する。
  pre-install には weight をマイナスにして PostgreSQL StatefulSet より後に動くように調整も可能だが、
  通常は bitnami-postgresql の preInstall も既定で動くため -5 とする。

  失敗したら Helm 全体が失敗扱いになり backend は ロールアウトされない (= 安全側に倒れる)。
*/}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ubichill.fullname" . }}-migrate
  labels:
    {{- include "ubichill.labels" . | nindent 4 }}
    component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.backend.migrate.backoffLimit | default 2 }}
  ttlSecondsAfterFinished: {{ .Values.backend.migrate.ttlSecondsAfterFinished | default 300 }}
  template:
    metadata:
      labels:
        {{- include "ubichill.selectorLabels" . | nindent 8 }}
        component: migrate
    spec:
      restartPolicy: Never
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      containers:
      - name: migrate
        securityContext:
          {{- toYaml .Values.backend.securityContext | nindent 10 }}
        image: {{ include "ubichill.backend.image" . }}
        imagePullPolicy: {{ .Values.backend.image.pullPolicy | default .Values.global.imagePullPolicy }}
        command: ["node", "node_modules/@ubichill/db/dist/migrate.js"]
        env:
        {{- /* DATABASE_URL は backend Deployment と同じ流儀で組み立てる */}}
        {{- if .Values.postgresql.enabled }}
        {{- if .Values.postgresql.auth.existingSecret }}
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.auth.existingSecret }}
              key: {{ .Values.postgresql.auth.secretKeys.adminPasswordKey | default "postgres-password" }}
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.postgresql.auth.username | default "postgres" }}:$(PG_PASSWORD)@{{ include "ubichill.fullname" . }}-postgresql:{{ .Values.postgresql.primary.service.ports.postgresql | default 5432 }}/{{ .Values.postgresql.auth.database }}"
        {{- else }}
        {{- if not .Values.postgresql.auth.password }}
        {{- fail "postgresql.auth.password (アプリ用ユーザーのパスワード) を設定してください。postgresql.auth.existingSecret でも可。" }}
        {{- end }}
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.postgresql.auth.username | default "postgres" }}:{{ .Values.postgresql.auth.password }}@{{ include "ubichill.fullname" . }}-postgresql:{{ .Values.postgresql.primary.service.ports.postgresql | default 5432 }}/{{ .Values.postgresql.auth.database }}"
        {{- end }}
        {{- end }}
        resources:
          {{- toYaml (.Values.backend.migrate.resources | default .Values.backend.resources) | nindent 10 }}
{{- end }}
{{- end }}
