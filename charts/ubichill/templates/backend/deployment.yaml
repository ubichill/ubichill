{{- if .Values.backend.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ubichill.fullname" . }}-backend
  labels:
    {{- include "ubichill.labels" . | nindent 4 }}
    component: backend
spec:
  replicas: {{ .Values.backend.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ubichill.selectorLabels" . | nindent 6 }}
      component: backend
  template:
    metadata:
      annotations:
        # Force pod restart on chart upgrade
        rollme: {{ randAlphaNum 5 | quote }}
      labels:
        {{- include "ubichill.selectorLabels" . | nindent 8 }}
        component: backend
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.nodeAffinity.enabled }}
      affinity:
        nodeAffinity:
          {{- with .Values.nodeAffinity.preferredDuringSchedulingIgnoredDuringExecution }}
          preferredDuringSchedulingIgnoredDuringExecution:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  {{- include "ubichill.selectorLabels" . | nindent 18 }}
                  component: backend
              topologyKey: kubernetes.io/hostname
      {{- end }}
      terminationGracePeriodSeconds: {{ .Values.backend.terminationGracePeriodSeconds | default 30 }}
      serviceAccountName: {{ include "ubichill.serviceAccountName.backend" . }}
      securityContext:
        {{- toYaml .Values.backend.podSecurityContext | nindent 8 }}
      containers:
      - name: backend
        securityContext:
          {{- toYaml .Values.backend.securityContext | nindent 10 }}
        image: {{ include "ubichill.backend.image" . }}
        imagePullPolicy: {{ .Values.backend.image.pullPolicy | default .Values.global.imagePullPolicy }}
        lifecycle:
          preStop:
            exec:
              # Ingress がこの pod をバックエンドから除外するまで待機してから SIGTERM を受け取る
              command: ["sleep", "5"]
        ports:
        - name: http
          containerPort: {{ .Values.backend.service.targetPort }}
          protocol: TCP
        {{- /*
          ── 環境変数 ──
          通常 env は ConfigMap (backend-config) と Secret (backend-secrets / existingSecret)
          にまとめて envFrom で一括 mount する。
          DATABASE_URL と WORLDS_REGISTRY_TOKEN だけは valueFrom や動的組立が要るので
          env: に inline で残す。
        */}}
        envFrom:
        - configMapRef:
            name: {{ include "ubichill.fullname" . }}-backend-config
        {{- if .Values.backend.existingSecret }}
        - secretRef:
            name: {{ .Values.backend.existingSecret }}
        {{- else if .Values.backend.secretEnv }}
        - secretRef:
            name: {{ include "ubichill.fullname" . }}-backend-secrets
        {{- end }}
        env:
        {{- /* PostgreSQL: DATABASE_URL は postgres password を含むため inline で組み立てる */}}
        {{- if .Values.postgresql.enabled }}
        {{- if .Values.postgresql.auth.existingSecret }}
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.postgresql.auth.existingSecret }}
              key: {{ .Values.postgresql.auth.secretKeys.adminPasswordKey | default "postgres-password" }}
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.postgresql.auth.username | default "postgres" }}:$(PG_PASSWORD)@{{ include "ubichill.fullname" . }}-postgresql:{{ .Values.postgresql.primary.service.ports.postgresql | default 5432 }}/{{ .Values.postgresql.auth.database }}"
        {{- else }}
        {{- /*
          DATABASE_URL は **アプリ用ユーザー** (auth.username, デフォルト ubichill) で繋ぐ。
          bitnami postgresql サブチャートはこのユーザーを `auth.password` で作成するため、
          ここで `auth.postgresPassword` (= 管理者 postgres のパスワード) にフォールバック
          してはいけない (繋ぎに行くユーザーと作られるユーザーのパスワードがズレる)。
        */}}
        {{- if not .Values.postgresql.auth.password }}
        {{- fail "postgresql.auth.password (アプリ用ユーザーのパスワード) を設定してください。postgresql.auth.existingSecret でも可。" }}
        {{- end }}
        - name: DATABASE_URL
          value: "postgresql://{{ .Values.postgresql.auth.username | default "postgres" }}:{{ .Values.postgresql.auth.password }}@{{ include "ubichill.fullname" . }}-postgresql:{{ .Values.postgresql.primary.service.ports.postgresql | default 5432 }}/{{ .Values.postgresql.auth.database }}"
        {{- end }}
        {{- end }}
        {{- if or .Values.worlds.registryToken .Values.worlds.existingTokenSecret }}
        - name: WORLDS_REGISTRY_TOKEN
          valueFrom:
            secretKeyRef:
              name: {{ .Values.worlds.existingTokenSecret | default (printf "%s-worlds-token" (include "ubichill.fullname" .)) }}
              key: token
        {{- end }}
        {{- if .Values.backend.healthcheck.enabled }}
        livenessProbe:
          httpGet:
            path: {{ .Values.backend.healthcheck.path }}
            port: http
          initialDelaySeconds: {{ .Values.backend.healthcheck.livenessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.backend.healthcheck.livenessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.backend.healthcheck.livenessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.backend.healthcheck.livenessProbe.failureThreshold }}
        readinessProbe:
          httpGet:
            path: {{ .Values.backend.healthcheck.path }}
            port: http
          initialDelaySeconds: {{ .Values.backend.healthcheck.readinessProbe.initialDelaySeconds }}
          periodSeconds: {{ .Values.backend.healthcheck.readinessProbe.periodSeconds }}
          timeoutSeconds: {{ .Values.backend.healthcheck.readinessProbe.timeoutSeconds }}
          failureThreshold: {{ .Values.backend.healthcheck.readinessProbe.failureThreshold }}
        {{- end }}
        volumeMounts:
        - name: worlds-rw
          mountPath: /worlds-rw
        resources:
          {{- toYaml .Values.backend.resources | nindent 12 }}
      volumes:
      - name: worlds-rw
        emptyDir: {}
{{- end }}
