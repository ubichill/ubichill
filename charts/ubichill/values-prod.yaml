# Production environment values for ubichill
# Override default values for production

# Production image registry
global:
  imageRegistry: "ghcr.io"
  security:
    allowInsecureImages: true

# Backend configuration for production
backend:
  replicaCount: 1  # High availability disabled due to lack of multi-replica support
  
  image:
    repository: "ubichill-backend"
    tag: "stable"  # Use stable tags in production
    pullPolicy: IfNotPresent
  
  resources:
    limits:
      cpu: 1500m
      memory: 1.5Gi
    requests:
      cpu: 300m
      memory: 512Mi
  
  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 12
    targetCPUUtilizationPercentage: 60  # More conservative scaling
    targetMemoryUtilizationPercentage: 70
  
  env:
    NODE_ENV: "production"
    # CORS_ORIGIN / BETTER_AUTH_URL は global.domain から自動導出される
  secretEnv:
    BETTER_AUTH_SECRET: "replace-in-production-vault"
    RESEND_API_KEY: "replace-in-production-vault"

# Frontend configuration for production
frontend:
  replicaCount: 1  # High availability disabled due to lack of multi-replica support
  
  image:
    repository: "ubichill-frontend"
    tag: "stable"  # Use stable tags in production
    pullPolicy: IfNotPresent
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 200m
      memory: 256Mi
  
  autoscaling:
    enabled: false
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  
  env:
    NODE_ENV: "production"
    # Video Player URL: /plugin/video-player にフォールバック (設定不要)

# Production Redis with persistence
redis:
  enabled: true
  master:
    persistence:
      enabled: true
      size: 5Gi
    resources:
      limits:
        memory: 1Gi
        cpu: 500m
      requests:
        memory: 512Mi
        cpu: 200m

# Production PostgreSQL
postgresql:
  enabled: true
  auth:
    postgresPassword: "CHANGE-ME-IN-PRODUCTION"
    database: "ubichill"
  primary:
    persistence:
      enabled: true
      size: 20Gi
    resources:
      limits:
        memory: 2Gi
        cpu: 1000m
      requests:
        memory: 512Mi
        cpu: 200m

# Worlds registry for production
worlds:
  registries:
    - https://github.com/ubichill/ubichill/tree/main/worlds

# Plugin backends for production
pluginBackends:
  - id: video-player
    image:
      repository: ghcr.io/ubichill/video-player-backend
      tag: stable
    port: 8000
    pathPrefix: /plugins/video-player/api
    replicaCount: 1
    env:
      ROOT_PATH: /plugins/video-player/api
      # CORS_ORIGINS は global.domain から自動注入される。上書きが必要な場合のみ設定
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 200m
        memory: 256Mi

# Enable monitoring in production
monitoring:
  enabled: true
  serviceMonitor:
    enabled: true

# Enable node affinity for multi-AZ deployment
nodeAffinity:
  enabled: true

# Ingress configuration for production
ingress:
  enabled: true
  className: ""  # Cloudflare Ingress の場合は該当クラス名を設定
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  # hosts / tls は global.domain から自動生成される
  # 独自の TLS 設定が必要な場合のみ以下を有効化:
  # tls:
  #   - secretName: my-tls-secret
  #     hosts:
  #       - example.com
  # hosts:
  #   - host: example.com
  #     paths: [...]