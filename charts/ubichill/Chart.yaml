apiVersion: v2
name: ubichill
description: Ubichill Main Application - Frontend and Backend Platform
type: application
version: 0.1.7
appVersion: "latest"

keywords:
  - ubichill
  - platform
  - frontend
  - backend
  - plugins

maintainers:
  - name: Ubichill Team
    email: pnasimonan@gmail.com

# Dependencies for shared services (optional Redis, PostgreSQL, etc.)
dependencies:
  - name: redis
    version: "20.6.1"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: postgresql
    version: "16.4.3"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  # video-player は独立した Helm チャート（charts/video-player）として別途デプロイする。
  # 例: helm install video-player ./charts/video-player -f ./charts/video-player/values-dev.yaml