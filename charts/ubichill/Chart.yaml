apiVersion: v2
name: ubichill
description: Ubichill Main Application - Frontend and Backend Platform
type: application
version: 0.1.7
appVersion: "latest"

keywords:
  - ubichill
  - platform
  - frontend
  - backend
  - plugins

maintainers:
  - name: Ubichill Team
    email: pnasimonan@gmail.com

# Dependencies for shared services (optional Redis, PostgreSQL, etc.)
dependencies:
  - name: redis
    version: "20.6.1"
    repository: "https://charts.bitnami.com/bitnami"
    condition: redis.enabled
  - name: postgresql
    version: "16.4.3"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
  # プラグインバックエンド（video-player の yt-dlp など）はこの chart の `pluginBackends`
  # で一緒にデプロイする（別チャートではない）。values の pluginBackends[] を参照。