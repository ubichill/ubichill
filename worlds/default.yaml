apiVersion: ubichill.com/v1alpha1
kind: World
metadata:
  name: default
  version: "1.0.0"
  author:
    name: "Ubichill Team"
spec:
  displayName: "デフォルトワールド"
  description: "Ubichill のデフォルトコラボレーションスペース"
  thumbnail: "https://images.unsplash.com/photo-1519389950473-47ba0277781c?w=400&h=200&fit=crop&q=80"

  capacity:
    default: 10
    max: 20

  environment:
    backgroundColor: "#F0F8FF"
    worldSize:
      width: 2000
      height: 1500

  # パッケージ依存関係
  dependencies:
    - name: pen
      source:
        type: repository
        path: "plugins/pen"
    - name: video-player
      source:
        type: repository
        path: "plugins/video-player"
    - name: avatar
      source:
        type: repository
        path: "plugins/avatar"

  # 初期 GameObject（id + transform + components[]）
  #
  # ── z-index レイヤー構成 ──────────────────────────────────────
  # transform.z が GenericPluginHost の CSS zIndex に直接対応する。
  # pointer-events: none のプラグインは視覚的に上にあっても UI 操作を妨げない。
  #
  #  z=10100  avatar:cursor        カーソル（最前面・常時表示）
  #  z= 9998  avatar:settings      アバター設定パネル
  #  z= 5000  pen:canvas           描画レイヤー
  #  z= 1001  pen:pen              ペン本体（tray より前面でクリック可）
  #  z= 1000  pen:tray             ペントレイ UI（背景の枠のみ）
  #  z=  200  video-player:controls / playlist / search   コントロール UI 群
  #  z=    2  video-player:screen  動画表示（黒 16:9 背景・親 Entity）
  # ─────────────────────────────────────────────────────────────

  initialEntities:
    # ── ペンキャンバス ───────────────────────────────────────────
    - id: pen-canvas
      transform:
        x: 0
        y: 0
        z: 5000
        scale: 1
        rotation: 0
      components:
        - type: "pen:canvas"
          data: {}

    # ── ビデオ: screen (親) + controls / playlist / search (子) ──
    # 子は screen を watchScope='parent' で読み書きする。
    # 子の transform.x/y は親基準の相対座標 (backend で flatten)。
    - id: video-screen
      transform:
        x: 800
        y: 60
        z: 2
        w: 640
        h: 360
        scale: 1
        rotation: 0
      components:
        - type: "video-player:screen"
          data:
            playlist:
              - id: "jfKfPfyJRdk"
                title: "lofi hip hop radio - beats to relax/study to"
                thumbnail: "https://i.ytimg.com/vi/jfKfPfyJRdk/default.jpg"
                duration: 0
                mode: "live"
            currentIndex: 0
            isPlaying: false
            currentTime: 0
            duration: 0
            loop: "none"
            shuffle: false
            apiBase: "/plugins/video-player/api"
      children:
        - id: video-controls
          transform: { x: 0, y: 370, z: 198, w: 640, h: 60, scale: 1, rotation: 0 }
          components:
            - type: "video-player:controls"
              data: {}
        - id: video-playlist
          transform: { x: 0, y: 440, z: 198, w: 310, h: 300, scale: 1, rotation: 0 }
          components:
            - type: "video-player:playlist"
              data: {}
        - id: video-search
          transform: { x: 330, y: 440, z: 198, w: 310, h: 300, scale: 1, rotation: 0 }
          components:
            - type: "video-player:search"
              data: {}

    # ── アバター（カーソル + 設定）──────────────────────────────
    - id: avatar-cursor
      transform:
        x: 0
        y: 0
        z: 10100
        scale: 1
        rotation: 0
      components:
        - type: "avatar:cursor"
          data: {}

    - id: avatar-settings
      transform:
        x: 20
        y: 100
        z: 9998
        scale: 1
        rotation: 0
      components:
        - type: "avatar:settings"
          data: {}

    # ── ペントレイ A (暖色): tray は容器、pen:pen は独立 Entity ────
    # tray はもうペンを管理しない。各 pen:pen が自分で表示・選択を扱う。
    # 階層上は children に置くが、座標は world 座標 (絶対位置)。
    - id: pen-tray-warm
      transform:
        x: 20
        y: 20
        z: 1000
        w: 60
        h: 240
        scale: 1
        rotation: 0
      components:
        - type: "pen:tray"
          data: {}
      children:
        - id: pen-black
          transform: { x: 32, y: 32, z: 1001, w: 36, h: 48, scale: 1, rotation: 0 }
          components:
            - type: "pen:pen"
              data: { color: "#1a1a1a", strokeWidth: 4 }
        - id: pen-red
          transform: { x: 32, y: 92, z: 1001, w: 36, h: 48, scale: 1, rotation: 0 }
          components:
            - type: "pen:pen"
              data: { color: "#e63946", strokeWidth: 4 }
        - id: pen-yellow
          transform: { x: 32, y: 152, z: 1001, w: 36, h: 48, scale: 1, rotation: 0 }
          components:
            - type: "pen:pen"
              data: { color: "#e9c46a", strokeWidth: 4 }

    # ── ペントレイ B (寒色) ────────────────────────────────────────────
    - id: pen-tray-cool
      transform:
        x: 100
        y: 20
        z: 1000
        w: 60
        h: 180
        scale: 1
        rotation: 0
      components:
        - type: "pen:tray"
          data: {}
      children:
        - id: pen-blue
          transform: { x: 112, y: 32, z: 1001, w: 36, h: 48, scale: 1, rotation: 0 }
          components:
            - type: "pen:pen"
              data: { color: "#457b9d", strokeWidth: 4 }
        - id: pen-green
          transform: { x: 112, y: 92, z: 1001, w: 36, h: 48, scale: 1, rotation: 0 }
          components:
            - type: "pen:pen"
              data: { color: "#2a9d8f", strokeWidth: 4 }

  permissions:
    allowGuestCreate: true
    allowGuestDelete: false
