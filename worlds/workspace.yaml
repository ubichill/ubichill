apiVersion: ubichill.com/v1alpha1
kind: World
metadata:
  name: workspace
  version: "1.0.0"
  author:
    name: "Ubichill Team"
spec:
  displayName: "ワークスペース"
  description: "落ち着いた雰囲気の作業空間"
  thumbnail: "https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&h=200&fit=crop&q=80"

  capacity:
    default: 8
    max: 15

  environment:
    backgroundColor: "#1a1a2e"
    backgroundImage: "https://images.unsplash.com/photo-1497366216548-37526070297c?w=1920&q=80"
    worldSize:
      width: 2000
      height: 1500

  dependencies:
    - name: pen
      source:
        type: repository
        path: "plugins/pen"
    - name: video-player
      source:
        type: repository
        path: "plugins/video-player"
    - name: avatar
      source:
        type: repository
        path: "plugins/avatar"

  initialEntities:
    # ── ペンキャンバス ───────────────────────────────────────────
    - kind: "pen:canvas"
      transform:
        x: 0
        y: 0
        z: 5000
        scale: 1
        rotation: 0
      data: {}

    - kind: "video-player:video"
      transform:
        x: 800
        y: 100
        z: 2
        w: 620
        scale: 1
        rotation: 0
      data:
        playlist: []
        currentIndex: 0
        isPlaying: false
        volume: 0.7
        currentTime: 0
        loop: 'none'
        shuffle: false
        fetchDomains: []

    # ── アバター設定 ─────────────────────────────────────────────
    - kind: "avatar:cursor"
      transform:
        x: 0
        y: 0
        z: 10100
        scale: 1
        rotation: 0
      data: {}

    - kind: "avatar:settings"
      transform:
        x: 20
        y: 100
        z: 9998
        scale: 1
        rotation: 0
      data: {}

    # ── ペントレイ ──────────────────────────────────────────────
    - kind: "pen:tray"
      transform:
        x: 20
        y: 20
        z: 1000
        scale: 1
        rotation: 0
      data: {}

    # ── ペン (色ごとに 1 エンティティ) ──────────────────────────
    - kind: "pen:pen"
      transform:
        x: 0
        y: 0
        z: 1
        scale: 1
        rotation: 0
      data:
        color: "#1a1a1a"
        strokeWidth: 4

    - kind: "pen:pen"
      transform:
        x: 0
        y: 0
        z: 2
        scale: 1
        rotation: 0
      data:
        color: "#e63946"
        strokeWidth: 4

    - kind: "pen:pen"
      transform:
        x: 0
        y: 0
        z: 3
        scale: 1
        rotation: 0
      data:
        color: "#457b9d"
        strokeWidth: 4

    - kind: "pen:pen"
      transform:
        x: 0
        y: 0
        z: 4
        scale: 1
        rotation: 0
      data:
        color: "#2a9d8f"
        strokeWidth: 4

    - kind: "pen:pen"
      transform:
        x: 0
        y: 0
        z: 5
        scale: 1
        rotation: 0
      data:
        color: "#e9c46a"
        strokeWidth: 4

  permissions:
    allowGuestCreate: true
    allowGuestDelete: false
