apiVersion: ubichill.com/v1alpha1
kind: World
metadata:
  name: workspace
  version: "1.0.0"
  author:
    name: "Ubichill Team"
spec:
  displayName: "ワークスペース"
  description: "落ち着いた雰囲気の作業空間"
  thumbnail: "https://images.unsplash.com/photo-1497366216548-37526070297c?w=400&h=200&fit=crop&q=80"

  capacity:
    default: 8
    max: 15

  environment:
    backgroundColor: "#1a1a2e"
    worldSize:
      width: 2000
      height: 1500

  dependencies:
    - name: pen
      source:
        type: repository
        path: "plugins/pen"
    - name: video-player
      source:
        type: repository
        path: "plugins/video-player"

  initialEntities:
    # ── ペンキャンバス ───────────────────────────────────────────
    - id: pen-canvas
      transform:
        x: 0
        y: 0
        z: 5000
        scale: 1
        rotation: 0
      components:
        - type: "pen:canvas"
          data: {}

    # ── 動画 (controls 不在の自由配置) ──────────────────────────
    - id: video-screen
      transform:
        x: 800
        y: 100
        z: 2
        w: 620
        scale: 1
        rotation: 0
      components:
        - type: "video-player:screen"
          data:
            playlist: []
            currentIndex: 0
            isPlaying: false
            currentTime: 0
            loop: "none"
            shuffle: false
            fetchDomains: []

    # ── ペントレイ ──────────────────────────────────────────────
    - id: pen-tray
      transform:
        x: 20
        y: 20
        z: 1000
        scale: 1
        rotation: 0
      components:
        - type: "pen:tray"
          data: {}

    # ── ペン (色ごとに 1 Entity) ──────────────────────────────────
    - id: pen-black
      transform:
        x: 0
        y: 0
        z: 1001
        scale: 1
        rotation: 0
      components:
        - type: "pen:pen"
          data:
            color: "#1a1a1a"
            strokeWidth: 4

    - id: pen-red
      transform:
        x: 0
        y: 0
        z: 1002
        scale: 1
        rotation: 0
      components:
        - type: "pen:pen"
          data:
            color: "#e63946"
            strokeWidth: 4

    - id: pen-blue
      transform:
        x: 0
        y: 0
        z: 1003
        scale: 1
        rotation: 0
      components:
        - type: "pen:pen"
          data:
            color: "#457b9d"
            strokeWidth: 4

    - id: pen-green
      transform:
        x: 0
        y: 0
        z: 1004
        scale: 1
        rotation: 0
      components:
        - type: "pen:pen"
          data:
            color: "#2a9d8f"
            strokeWidth: 4

    - id: pen-yellow
      transform:
        x: 0
        y: 0
        z: 1005
        scale: 1
        rotation: 0
      components:
        - type: "pen:pen"
          data:
            color: "#e9c46a"
            strokeWidth: 4

  permissions:
    allowGuestCreate: true
    allowGuestDelete: false
