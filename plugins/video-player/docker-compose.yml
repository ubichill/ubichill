version: '3.8'

services:
  music-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - CORS_ORIGINS=*
      # Vite proxy のプレフィックスと合わせる → m3u8 内セグメントURLを正しくリライト
      - ROOT_PATH=/plugins/video-player/api
    volumes:
      # main.pyのみマウント（.venvを保護）
      - ./backend/main.py:/app/main.py
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ubichill-network

networks:
  ubichill-network:
    external: true
name: ubichill-video-player
